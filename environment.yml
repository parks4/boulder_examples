name: boulder
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - cantera
  - numpy>=2.4.0
  - pandas
  - h5py
  - matplotlib
  - graphviz          # dot, neato, … (Graphviz system binaries) — Boulder's Network tab
  - python-graphviz   # Python bindings; uses dot from the graphviz package above
  - make
  - myst-parser
  - pydata-sphinx-theme
  - pytest
  - pytest-cov
  - ruff
  - sphinx
  - pip:
      - -r requirements.txt
      - -r requirements-dev.txt
