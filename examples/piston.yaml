phases:
  gas:
    mechanism: gri30.yaml
settings:
# derived_via: ast_match
  solver:
    kind: advance_grid
    grid:
      start: 0.0
      stop: 0.2
      dt: 0.001

network:
- id: Left reactor (H2/O2/Ar)
  IdealGasReactor:
    volume: 0.5
    initial:
      temperature: 900.0 K
      pressure: 101325.00000000001 Pa
      composition: AR:0.869565,H2:0.0869565,O2:0.0434783
  mechanism: h2o2.yaml
- id: Right reactor (CO/H2O/O2)
  IdealGasReactor:
    volume: 0.1
    initial:
      temperature: 900.0 K
      pressure: 101324.99999999999 Pa
      composition: O2:0.713267,CO:0.285307,H2O:0.00142653
- id: Piston
  Wall:
    velocity:
      closure: pressure_proportional
      coeff: 0.0001
      start_time: 0.1
  source: Left reactor (H2/O2/Ar)
  target: Right reactor (CO/H2O/O2)
