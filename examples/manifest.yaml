upstream:
  repository: https://github.com/Cantera/cantera
  path: samples/python/reactors
  ref: main
  license: BSD-3-Clause

codespaces:
  repo: parks4/boulder_examples
  branch: main

examples:
  - id: combustor
    title: Steady combustor residence time
    status: adapted
    upstream_file: combustor.py
    adapter_file: adapters/combustor.py
    upstream_url: https://github.com/Cantera/cantera/blob/main/samples/python/reactors/combustor.py
    stone_yaml: examples/combustor.yaml
    mechanism: gri30.yaml
    screenshot: docs/_static/screenshots/combustor.png
    run_sweep_file: examples/run_sweep.py
    notes: >-
      Upstream sweeps residence time down from 0.1 s in 0.9x steps until the
      combustor extinguishes (T <= 500 K) -- an exploratory stop condition,
      not a fixed value list, so it can't be expressed as a static
      sweep:/scenario: block. The base YAML is the single steady solve at the
      0.1 s reference point (solver.kind: solve_steady, with a
      closure: residence_time MFC), and run_sweep.py (a host-provided sweep
      runner Boulder's /api/sweep invokes) reproduces the full extinction
      sweep, writing one scenario per residence time to the Scenario pane's
      store with residence_time_s/final_temperature_K/heat_release_rate_w_m3
      attrs -- pick Residence Time S / Heat Release Rate in the Sweep results
      pane's axis selectors for the same plot upstream's script produces.

  - id: reactor2
    title: Piston reactor with heat transfer
    status: adapted
    upstream_file: reactor2.py
    adapter_file: adapters/reactor2.py
    upstream_url: https://github.com/Cantera/cantera/blob/main/samples/python/reactors/reactor2.py
    stone_yaml: examples/reactor2.yaml
    mechanism: gri30.yaml
    screenshot: docs/_static/screenshots/reactor2.png
    notes: >-
      Transient advance-grid example. The piston wall's expansion_rate_coeff
      (K) and heat_transfer_coeff (U) are both captured in STONE, so Boulder
      reproduces upstream's pressure-driven piston motion and heat exchange
      together; plots focus on reactor temperature and pressure evolution.

  - id: nanosecond_pulse_discharge
    title: Nanosecond pulse discharge
    status: adapted
    upstream_file: nanosecond_pulse_discharge.py
    adapter_file: adapters/nanosecond_pulse_discharge.py
    upstream_url: >-
      https://github.com/Cantera/cantera/blob/main/samples/python/reactors/nanosecond_pulse_discharge.py
    stone_yaml: examples/nanosecond_pulse_discharge.yaml
    mechanism: example_data/methane-plasma-pavan-2023.yaml
    screenshot: docs/_static/screenshots/nanosecond_pulse_discharge.png
    notes: >-
      Plasma micro-step example with Gaussian reduced-electric-field signal.
      Upstream runs with energy: "on" so plasma heating feeds back into gas
      temperature and accelerates the discharge; this adapter uses energy:
      "off" because Cantera 3.2's PlasmaPhase has no cp_mole() implementation,
      so energy: "on" raises "NotImplementedError: PlasmaPhase::cp_mole" the
      moment the reactor's energy equation needs a heat capacity. Without that
      thermal feedback the discharge never reaches upstream's self-sustaining
      avalanche regime, so temperature and product-species mole fractions stay
      many orders of magnitude below upstream's plot -- a genuine, currently
      open Cantera limitation (not a Boulder conversion defect). Re-check once
      PlasmaPhase::cp_mole is implemented upstream.

  - id: mix1
    title: Mixer with two inlet streams
    status: adapted
    upstream_file: mix1.py
    adapter_file: adapters/mix1.py
    upstream_url: https://github.com/Cantera/cantera/blob/main/samples/python/reactors/mix1.py
    stone_yaml: examples/mix1.yaml
    mechanism: gri30.yaml
    screenshot: docs/_static/screenshots/mix1.png
    notes: >-
      Dual-mechanism steady mixer with MFC and valve; uses solve_steady and
      OutletSink for the downstream boundary.

  - id: reactor1
    title: Constant-pressure ignition
    status: adapted
    upstream_file: reactor1.py
    adapter_file: adapters/reactor1.py
    upstream_url: https://github.com/Cantera/cantera/blob/main/samples/python/reactors/reactor1.py
    stone_yaml: examples/reactor1.yaml
    mechanism: h2o2.yaml
    screenshot: docs/_static/screenshots/reactor1.png
    notes: >-
      Single IdealGasConstPressureReactor with temperature advance limit and
      advance_grid transient integration.

  - id: periodic_cstr
    title: Periodic CSTR
    status: adapted
    upstream_file: periodic_cstr.py
    adapter_file: adapters/periodic_cstr.py
    upstream_url: https://github.com/Cantera/cantera/blob/main/samples/python/reactors/periodic_cstr.py
    stone_yaml: examples/periodic_cstr.yaml
    mechanism: h2o2.yaml
    screenshot: docs/_static/screenshots/periodic_cstr.png
    notes: CSTR with MFC, valve, and heat-transfer wall.

  - id: fuel_injection
    title: Fuel injection with Gaussian pulse
    status: adapted
    upstream_file: fuel_injection.py
    adapter_file: adapters/fuel_injection.py
    upstream_url: https://github.com/Cantera/cantera/blob/main/samples/python/reactors/fuel_injection.py
    stone_yaml: examples/fuel_injection.yaml
    mechanism: nDodecane_Reitz.yaml
    screenshot: docs/_static/screenshots/fuel_injection.png
    notes: Transient fuel pulse; Gaussian MFC signal when AST detection succeeds.

  - id: preconditioned_integration
    title: Preconditioned single-reactor integration
    status: unsupported
    upstream_file: preconditioned_integration.py
    upstream_url: >-
      https://github.com/Cantera/cantera/blob/main/samples/python/reactors/preconditioned_integration.py
    unsupported_reason: >-
      Compares integration wall-clock time with vs. without a sparse
      preconditioner across two full re-runs of the same network -- a
      solver-performance A/B benchmark, not a single network solve, so it
      has no STONE representation (same class of issue as
      preconditioned_network below). The n-heptane-NUIG-2016.yaml mechanism
      it needs is already vendored under upstream/cantera/example_data/.

  - id: 1D_packed_bed
    title: 1D packed bed (DAE)
    status: unsupported
    upstream_file: 1D_packed_bed.py
    upstream_url: https://github.com/Cantera/cantera/blob/main/samples/python/reactors/1D_packed_bed.py
    unsupported_reason: Custom scikits.odes DAE packed-bed model; no global ReactorNet.
  - id: 1D_pfr_surfchem
    title: 1D PFR surface chemistry
    status: unsupported
    upstream_file: 1D_pfr_surfchem.py
    upstream_url: https://github.com/Cantera/cantera/blob/main/samples/python/reactors/1D_pfr_surfchem.py
    unsupported_reason: >-
      Uses FlowReactor + ReactorSurface, now supported by Boulder (see
      surf_pfr below and https://github.com/parks4/boulder/pull/112) --
      not yet adapted here: this script's mechanism (SiF4_NH3_mec.yaml,
      silicon nitride deposition) and matplotlib-only diagnostics
      (deposition rate, surface site fractions) need their own STONE mapping,
      tracked separately from surf_pfr's simpler single-species-output case.
  - id: continuous_reactor
    title: Continuous reactor temperature sweep
    status: adapted
    upstream_file: continuous_reactor.py
    adapter_file: adapters/continuous_reactor.py
    upstream_url: https://github.com/Cantera/cantera/blob/main/samples/python/reactors/continuous_reactor.py
    stone_yaml: examples/continuous_reactor.yaml
    mechanism: gri30.yaml
    screenshot: docs/_static/screenshots/continuous_reactor.png
    run_sweep_file: examples/run_sweep.py
    notes: >-
      The outer temperature sweep is not one static STONE file (STONE's inline
      sweep:/scenario: blocks can't drive two nodes — inlet reservoir and
      reactor initial state — from one swept value), so the base YAML is the
      CSTR topology at the 925 K baseline point and run_sweep.py (a
      host-provided sweep runner Boulder's /api/sweep invokes) independently
      solves the other ten upstream temperatures to steady state, writing them
      to the Scenario pane's store. Mechanism substituted: upstream's
      example_data/n-heptane-NUIG-2016.yaml (1268 species) is not bundled in
      Boulder CI's Cantera distribution and is also impractically slow to
      clone through Boulder's per-node solve pipeline; this repo vendors it
      under upstream/cantera/example_data/ for provenance, but the shipped
      example uses the bundled gri30.yaml (CH4/O2/N2) — same CSTR topology and
      sweep methodology, CH4/CO/O2 in place of NC7H16/CO/O2.
  - id: custom
    title: Custom SciPy ODE
    status: unsupported
    upstream_file: custom.py
    upstream_url: https://github.com/Cantera/cantera/blob/main/samples/python/reactors/custom.py
    unsupported_reason: No ReactorNet; integrates ODEs directly with SciPy.
  - id: custom2
    title: Extensible inertial wall reactor
    status: unsupported
    upstream_file: custom2.py
    upstream_url: https://github.com/Cantera/cantera/blob/main/samples/python/reactors/custom2.py
    unsupported_reason: ExtensibleIdealGasReactor subclass with extra state is not rebuildable in Boulder.
  - id: ic_engine
    title: Internal combustion engine cycle
    status: unsupported
    upstream_file: ic_engine.py
    upstream_url: https://github.com/Cantera/cantera/blob/main/samples/python/reactors/ic_engine.py
    unsupported_reason: Valves and MFCs use time_function lambdas and moving piston walls.
  - id: non_ideal_shock_tube
    title: Non-ideal shock tube ignition delay sweep
    status: unsupported
    upstream_file: non_ideal_shock_tube.py
    upstream_url: https://github.com/Cantera/cantera/blob/main/samples/python/reactors/non_ideal_shock_tube.py
    unsupported_reason: Multi-temperature IDT sweep and real-gas phase switching are not static STONE.
  - id: pfr
    title: Plug-flow reactor (two methods)
    status: unsupported
    upstream_file: pfr.py
    upstream_url: https://github.com/Cantera/cantera/blob/main/samples/python/reactors/pfr.py
    unsupported_reason: Multiple ReactorNet objects and chain/Lagrangian algorithms are not one static YAML.
  - id: piston
    title: Moving piston with velocity wall
    status: adapted
    upstream_file: piston.py
    adapter_file: adapters/piston.py
    upstream_url: https://github.com/Cantera/cantera/blob/main/samples/python/reactors/piston.py
    stone_yaml: examples/piston.yaml
    mechanism: gri30.yaml
    screenshot: docs/_static/screenshots/piston.png
    notes: >-
      Dual-mechanism piston (h2o2.yaml left / gri30.yaml right) driven purely
      by a Wall velocity callable -- no expansion_rate_coeff/heat_transfer_coeff
      at all. Wall velocity Func1s (Cantera 3.0+) always read back as the
      evaluated float at the network's current time (same limitation as
      MassFlowController.mass_flow_rate), so sim2stone recovers the closure
      from source via AST detection instead: a
      ``{closure: pressure_proportional, coeff, start_time}`` spec matching
      upstream's ``def v(t): if t < 0.1: return 0.0 else: return
      (r1.phase.P - r2.phase.P) * 1e-4``. Dual-mechanism itself needed no new
      work -- per-node mechanism overrides already existed (see reactor2.yaml).
  - id: plasma
    title: Isothermal plasma electron balance
    status: unsupported
    upstream_file: plasma.py
    upstream_url: https://github.com/Cantera/cantera/blob/main/samples/python/reactors/plasma.py
    unsupported_reason: >-
      No ReactorNet; SciPy ODE for electron density directly. Not representable
      as a static STONE network, but this class of custom-ODE model can be
      implemented in Boulder today via a plugin using
      boulder.CustomStageNetwork
      (https://parks4.github.io/boulder/_api/boulder/index.html#boulder.CustomStageNetwork),
      see the "Extending Boulder with plugins" section of usage.rst
      (https://github.com/parks4/boulder/blob/main/docs/usage.rst#extending-boulder-with-plugins).
  - id: porous_media_burner
    title: Porous media burner cascade
    status: unsupported
    upstream_file: porous_media_burner.py
    upstream_url: https://github.com/Cantera/cantera/blob/main/samples/python/reactors/porous_media_burner.py
    unsupported_reason: Custom ExtensibleIdealGasConstPressureReactor cascade with radiation.
  - id: preconditioned_network
    title: Preconditioned multi-sector network
    status: unsupported
    upstream_file: preconditioned_network.py
    upstream_url: https://github.com/Cantera/cantera/blob/main/samples/python/reactors/preconditioned_network.py
    unsupported_reason: Multiple coupled networks and preconditioner benchmarking loops.
  - id: sensitivity1
    title: Sensitivity analysis
    status: unsupported
    upstream_file: sensitivity1.py
    upstream_url: https://github.com/Cantera/cantera/blob/main/samples/python/reactors/sensitivity1.py
    unsupported_reason: ReactorNet sensitivity API is not represented in STONE.
  - id: surf_pfr
    title: Surface PFR (FlowReactor)
    status: adapted
    upstream_file: surf_pfr.py
    adapter_file: adapters/surf_pfr.py
    upstream_url: https://github.com/Cantera/cantera/blob/main/samples/python/reactors/surf_pfr.py
    stone_yaml: examples/surf_pfr.yaml
    mechanism: methane_pox_on_pt.yaml
    screenshot: docs/_static/screenshots/surf_pfr.png
    notes: >-
      Real distance-marched ct.FlowReactor + ct.ReactorSurface (catalytic
      methane partial oxidation over Pt), not a chain-of-CSTRs approximation
      -- solved via solver.axis: distance (parks4/boulder#112). The adapter
      stops before the distance-marching loop (kept under `if False:`, same
      convention as piston.py's stepping guard) so sim2stone captures the
      true inlet state instead of the fully-converted outlet state.
      FlowReactor.mass_flow_rate is write-only in the Cantera 3.2 Python API;
      sim2stone recovers it from continuity (density x speed x area) instead
      of a direct read. Known gap: download_script_emitter.py doesn't support
      FlowReactor yet (a separate reactor-dispatch pathway from
      create_reactor_from_node), so the --download native-script test is
      skipped for this example -- YAML validation, normalization, and the
      real DualCanteraConverter solve all work correctly.
  - id: surf_pfr_chain
    title: Surface PFR chain
    status: unsupported
    upstream_file: surf_pfr_chain.py
    upstream_url: https://github.com/Cantera/cantera/blob/main/samples/python/reactors/surf_pfr_chain.py
    unsupported_reason: >-
      Repeated steady march with a ReactorSurface chain (a chain-of-WSRs
      approximation, as opposed to surf_pfr's real distance-marched
      FlowReactor, now supported -- see https://github.com/parks4/boulder/pull/112)
      is an algorithm, not static STONE: it re-solves the same WSR to steady
      state once per chain link, carrying the converged state forward as the
      next link's inlet. Out of scope for a single STONE description.
