phases:
  gas:
    mechanism: example_data/methane-plasma-pavan-2023.yaml
settings:
# derived_via: ast_match
  solver:
    kind: micro_step
    t_total: 9e-08
    chunk_dt: 1e-09
    max_dt: 1e-10
    reinitialize_between_chunks: true
    atol: 1.0e-15
    rtol: 1.0e-9

signals:
-
# derived_via: ast_match
  id: gaussian_EN
  Gaussian:
    peak: 1.8999999999999998e-19
    center: 2.4e-08
    fwhm: 7.064460135092848e-09

bindings:
-
# derived_via: ast_match
  source: gaussian_EN
  target: nodes.ConstPressureReactor_0.reduced_electric_field

network:
- id: ConstPressureReactor_0
  ConstPressureReactor:
    volume: 1.0
    energy: "off"
    clone: false
    initial:
      temperature: 300.0 K
      pressure: 101325.00000000003 Pa
      composition: N2:0.715,O2:0.19,CH4:0.095,e:1e-11
  plot_options:
    hide_species: [N2, O2, CH4]
    show_species: [e, O2+, N2+, H2O+, CH4+, O, "N2(A)", "N2(B)", "N2(C)", "N2(a')", CH3, CO2, CO, H2O, H, OH]
